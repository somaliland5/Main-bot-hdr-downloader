<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
}

.nav {
    background:#111a2e;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card {
    background:#1c2538;
    padding:20px;
    margin:20px;
    border-radius:12px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:20px;
}

.btn {
    padding:10px;
    background:#00c2ff;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.btn-red {
    background:red;
}

input {
    padding:10px;
    width:100%;
    margin:5px 0;
    border-radius:6px;
    border:none;
}
</style>
</head>

<body>

<div class="nav">
    <h2>🚀 Bot Control Panel</h2>
    <span>Dark Pro Dashboard</span>
</div>

<div class="grid">

    <!-- STATS -->
    <div class="card">
        <h3>📊 Stats</h3>
        <p>🤖 Bots: {{bots}}</p>
        <p>👥 Users: {{users}}</p>
    </div>

    <!-- ADD BOT -->
    <div class="card">
        <h3>➕ Add Bot</h3>

        <form method="POST" action="/add_bot">
            <input name="token" placeholder="Bot Token">
            <button class="btn">Add Bot</button>
        </form>
    </div>

    <!-- INFO -->
    <div class="card">
        <h3>⚙️ System</h3>
        <p>✔ Running</p>
        <p>✔ Secure Login</p>
        <p>✔ OTP Active</p>
    </div>

</div>

</body>
</html>
