<!DOCTYPE html>
<html>
<head>
<title>My Bots</title>
</head>

<body style="background:#0b1220;color:white;padding:20px;font-family:sans-serif">

<h2>📦 My Bots</h2>

{% for bot in bots %}

<div style="background:#1c1f2a;padding:10px;margin:10px;border-radius:8px">

<p>🤖 Bot: {{bot.username or bot.token[:10]}}</p>
<p>Status: {{bot.status}}</p>

<!-- DELETE BOT -->
<a href="/delete_bot/{{bot.token}}"
   style="color:red">
   ❌ Delete Bot
</a>

</div>

{% endfor %}

</body>
</html>
