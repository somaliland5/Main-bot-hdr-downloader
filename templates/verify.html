<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
</head>

<body style="background:#0b1220;color:white;text-align:center;padding-top:80px;font-family:sans-serif">

    <h2>📩 Enter OTP Code</h2>
    <p>Verify using Telegram bot</p>

    <!-- TELEGRAM BUTTON -->
    <a href="https://t.me/Date_to_daybot?start=otp"
       style="
        display:inline-block;
        background:#229ED9;
        color:white;
        padding:12px 20px;
        border-radius:8px;
        text-decoration:none;
        margin-bottom:20px;
        font-weight:bold;
       ">
        🤖 Get Code from Telegram Bot
    </a>

    <br><br>

    <!-- OTP FORM -->
    <form method="POST">
        <input name="code"
               placeholder="Enter 4-digit code"
               style="padding:10px;width:200px;border-radius:5px;border:none;text-align:center"
               required>

        <br><br>

        <button style="
            padding:10px 20px;
            background:#00c853;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer
        ">
            ✅ Verify
        </button>
    </form>

</body>
</html>
