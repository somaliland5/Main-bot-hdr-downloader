<!DOCTYPE html>
<html>
<head>
<title>User Panel</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>👤 Welcome {{name}}</h2>

<div class="card">

<h3>💬 Messages</h3>

{% for m in messages %}
<p><b>{{m.name}}:</b> {{m.msg}}</p>
{% endfor %}

</div>

<form method="POST" action="/send">
<input name="message" placeholder="Type message">
<button>Send</button>
</form>

</body>
</html>
